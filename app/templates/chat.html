<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discuss: {{ title }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        .container { max-width: 600px; width: 100%; }
        h1 { font-size: 1.4rem; margin-bottom: 0.5rem; color: #fff; }
        .summary { font-size: 0.9rem; color: #999; margin-bottom: 2rem; line-height: 1.5; }
        .call-area {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
        }
        #status { font-size: 0.85rem; color: #666; margin-bottom: 1.5rem; min-height: 1.2em; }
        #call-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        #call-btn:hover { background: #1d4ed8; transform: scale(1.05); }
        #call-btn.active { background: #dc2626; }
        #call-btn.active:hover { background: #b91c1c; }
        #call-btn:disabled { background: #333; cursor: not-allowed; transform: none; }
        #error-msg { color: #f87171; font-size: 0.8rem; margin-top: 1rem; display: none; }
        .transcript {
            margin-top: 1.5rem;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .transcript p { margin-bottom: 0.5rem; }
        .transcript .assistant { color: #60a5fa; }
        .transcript .user { color: #34d399; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ title }}</h1>
        <p class="summary">{{ summary[:300] }}{% if summary|length > 300 %}...{% endif %}</p>

        <div class="call-area">
            <div id="status">Click the mic to start a voice discussion</div>
            <button id="call-btn">&#x1F3A4;</button>
            <div id="error-msg"></div>
            <div class="transcript" id="transcript"></div>
        </div>
    </div>

    <script src="https://unpkg.com/@daily-co/daily-js"></script>
    <script>
        var SESSION_ID = "{{ session_id }}";
        var BASE_URL = window.location.origin;

        var btn = document.getElementById("call-btn");
        var statusEl = document.getElementById("status");
        var errorEl = document.getElementById("error-msg");

        var callFrame = null;
        var isCallActive = false;

        function setError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = msg ? "block" : "none";
        }

        btn.addEventListener("click", function() {
            if (isCallActive) {
                if (callFrame) callFrame.leave();
                isCallActive = false;
                btn.classList.remove("active");
                btn.innerHTML = "\uD83C\uDFA4";
                statusEl.textContent = "Call ended. Click mic to start again.";
                return;
            }

            btn.disabled = true;
            setError("");
            statusEl.textContent = "Creating voice call...";

            fetch(BASE_URL + "/chat/" + SESSION_ID + "/start", { method: "POST" })
                .then(function(resp) {
                    if (!resp.ok) throw new Error("Server error " + resp.status);
                    return resp.json();
                })
                .then(function(data) {
                    var webCallUrl = data.web_call_url;
                    console.log("Web call URL:", webCallUrl);
                    statusEl.textContent = "Connecting to voice call...";

                    callFrame = DailyIframe.createCallObject({
                        audioSource: true,
                        videoSource: false,
                    });

                    callFrame.on("joined-meeting", function() {
                        console.log("Joined meeting");
                        isCallActive = true;
                        btn.classList.add("active");
                        btn.disabled = false;
                        btn.innerHTML = "\u23F9";
                        statusEl.textContent = "Connected \u2014 speak now";
                        setError("");
                    });

                    callFrame.on("left-meeting", function() {
                        console.log("Left meeting");
                        isCallActive = false;
                        btn.classList.remove("active");
                        btn.disabled = false;
                        btn.innerHTML = "\uD83C\uDFA4";
                        statusEl.textContent = "Call ended. Click mic to start again.";
                        callFrame.destroy();
                        callFrame = null;
                    });

                    callFrame.on("error", function(err) {
                        console.error("Daily error:", err);
                        statusEl.textContent = "Connection error";
                        setError(err.errorMsg || JSON.stringify(err));
                        btn.disabled = false;
                        btn.classList.remove("active");
                        btn.innerHTML = "\uD83C\uDFA4";
                        isCallActive = false;
                    });

                    return callFrame.join({ url: webCallUrl });
                })
                .catch(function(err) {
                    console.error("Error:", err);
                    statusEl.textContent = "Failed to connect";
                    setError(err.message);
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
