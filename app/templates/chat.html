<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discuss: {{ title }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        .container { max-width: 600px; width: 100%; }
        h1 { font-size: 1.4rem; margin-bottom: 0.5rem; color: #fff; }
        .summary { font-size: 0.9rem; color: #999; margin-bottom: 2rem; line-height: 1.5; }
        .call-area {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
        }
        #status { font-size: 0.85rem; color: #666; margin-bottom: 1.5rem; min-height: 1.2em; }
        #call-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        #call-btn:hover { background: #1d4ed8; transform: scale(1.05); }
        #call-btn.active { background: #dc2626; }
        #call-btn.active:hover { background: #b91c1c; }
        #call-btn:disabled { background: #333; cursor: not-allowed; transform: none; }
        #call-btn.pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
        #error-msg { color: #f87171; font-size: 0.8rem; margin-top: 1rem; display: none; }
        .transcript {
            margin-top: 1.5rem;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .transcript p { margin-bottom: 0.5rem; }
        .transcript .agent { color: #60a5fa; }
        .transcript .user { color: #34d399; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ title }}</h1>
        <p class="summary">{{ summary[:300] }}{% if summary|length > 300 %}...{% endif %}</p>

        <div class="call-area">
            <div id="status">Click the mic to start a voice discussion</div>
            <button id="call-btn">&#x1F3A4;</button>
            <div id="error-msg"></div>
            <div class="transcript" id="transcript"></div>
        </div>
    </div>

    <script type="module">
        import { RetellWebClient } from "https://esm.sh/retell-client-js-sdk";

        var SESSION_ID = "{{ session_id }}";
        var BASE_URL = window.location.origin;

        var btn = document.getElementById("call-btn");
        var statusEl = document.getElementById("status");
        var errorEl = document.getElementById("error-msg");
        var transcriptEl = document.getElementById("transcript");

        var retellClient = new RetellWebClient();
        var isCallActive = false;

        function setError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = msg ? "block" : "none";
        }

        function addTranscript(role, text) {
            var p = document.createElement("p");
            p.className = role;
            p.textContent = (role === "agent" ? "AI: " : "You: ") + text;
            transcriptEl.appendChild(p);
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }

        // Retell events
        retellClient.on("call_started", function() {
            console.log("Call started");
            isCallActive = true;
            btn.classList.add("active");
            btn.classList.remove("pulse");
            btn.disabled = false;
            btn.innerHTML = "\u23F9";
            statusEl.textContent = "Connected \u2014 speak now";
            setError("");
        });

        retellClient.on("call_ended", function() {
            console.log("Call ended");
            isCallActive = false;
            btn.classList.remove("active", "pulse");
            btn.disabled = false;
            btn.innerHTML = "\uD83C\uDFA4";
            statusEl.textContent = "Call ended. Click mic to start again.";
        });

        retellClient.on("agent_start_talking", function() {
            statusEl.textContent = "Agent is speaking...";
        });

        retellClient.on("agent_stop_talking", function() {
            if (isCallActive) statusEl.textContent = "Listening...";
        });

        retellClient.on("update", function(update) {
            if (update.transcript) {
                transcriptEl.innerHTML = "";
                update.transcript.forEach(function(entry) {
                    addTranscript(entry.role, entry.content);
                });
            }
        });

        retellClient.on("error", function(err) {
            console.error("Retell error:", err);
            statusEl.textContent = "Connection error";
            setError(err.message || JSON.stringify(err));
            btn.disabled = false;
            btn.classList.remove("active", "pulse");
            btn.innerHTML = "\uD83C\uDFA4";
            isCallActive = false;
        });

        // Button handler
        btn.addEventListener("click", function() {
            if (isCallActive) {
                retellClient.stopCall();
                return;
            }

            btn.disabled = true;
            btn.classList.add("pulse");
            setError("");
            statusEl.textContent = "Creating voice call...";

            fetch(BASE_URL + "/chat/" + SESSION_ID + "/start", { method: "POST" })
                .then(function(resp) {
                    if (!resp.ok) throw new Error("Server error " + resp.status);
                    return resp.json();
                })
                .then(function(data) {
                    statusEl.textContent = "Connecting...";
                    return retellClient.startCall({
                        accessToken: data.access_token,
                    });
                })
                .catch(function(err) {
                    console.error("Error:", err);
                    statusEl.textContent = "Failed to connect";
                    setError(err.message);
                    btn.disabled = false;
                    btn.classList.remove("pulse");
                });
        });
    </script>
</body>
</html>
