<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discuss: {{ title }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        .container { max-width: 600px; width: 100%; }
        h1 { font-size: 1.4rem; margin-bottom: 0.5rem; color: #fff; }
        .summary { font-size: 0.9rem; color: #999; margin-bottom: 2rem; line-height: 1.5; }
        .call-area {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
        }
        #status { font-size: 0.85rem; color: #666; margin-bottom: 1rem; min-height: 1.2em; }
        #error-msg { color: #f87171; font-size: 0.8rem; margin-top: 0.5rem; display: none; }
        .info { font-size: 0.8rem; color: #555; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ title }}</h1>
        <p class="summary">{{ summary[:300] }}{% if summary|length > 300 %}...{% endif %}</p>

        <div class="call-area">
            <div id="status">Preparing document assistant...</div>
            <div id="error-msg"></div>
            <p class="info">A voice button will appear in the bottom-right corner once ready.</p>
        </div>
    </div>

    <script>
        const SESSION_ID = "{{ session_id }}";
        const VAPI_API_KEY = "{{ vapi_api_key }}";
        const BASE_URL = window.location.origin;

        async function init() {
            const statusEl = document.getElementById("status");
            const errorEl = document.getElementById("error-msg");

            try {
                // Step 1: Create assistant via our backend
                const resp = await fetch(BASE_URL + "/chat/" + SESSION_ID + "/start", { method: "POST" });
                if (!resp.ok) throw new Error("Server error: " + resp.status);
                const data = await resp.json();
                const assistantId = data.assistant_id;
                console.log("Assistant created:", assistantId);
                statusEl.textContent = "Assistant ready! Loading voice widget...";

                // Step 2: Load VAPI widget with the assistant ID
                var script = document.createElement("script");
                script.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
                script.defer = true;
                script.async = true;

                script.onload = function () {
                    statusEl.textContent = "Ready! Click the green button in the bottom-right to start talking.";
                    window.vapiSDK.run({
                        apiKey: VAPI_API_KEY,
                        assistant: assistantId,
                        config: {
                            position: "bottom-right",
                            offset: "40px",
                            width: "50px",
                            height: "50px",
                            idle: {
                                color: "rgb(93, 254, 202)",
                                type: "pill",
                                title: "Discuss Document",
                                subtitle: "Click to talk",
                                icon: "https://unpkg.com/lucide-static@0.321.0/icons/phone.svg",
                            },
                            loading: {
                                color: "rgb(93, 124, 202)",
                                type: "pill",
                                title: "Connecting...",
                                subtitle: "Please wait",
                                icon: "https://unpkg.com/lucide-static@0.321.0/icons/loader-2.svg",
                            },
                            active: {
                                color: "rgb(255, 0, 0)",
                                type: "pill",
                                title: "Call Active",
                                subtitle: "Click to end",
                                icon: "https://unpkg.com/lucide-static@0.321.0/icons/phone-off.svg",
                            },
                        },
                    });
                };

                script.onerror = function () {
                    statusEl.textContent = "Failed to load voice widget.";
                };

                document.body.appendChild(script);
            } catch (err) {
                console.error("Init error:", err);
                statusEl.textContent = "Failed to initialize.";
                errorEl.textContent = err.message;
                errorEl.style.display = "block";
            }
        }

        init();
    </script>
</body>
</html>
